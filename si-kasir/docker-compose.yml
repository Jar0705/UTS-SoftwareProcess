services:
  web:
    build: .
    container_name: si-kasir-web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASS=root
      - DB_NAME=db_majujaya
    networks:
      - si-kasir-network

  db:
    image: mariadb:11.4
    container_name: si-kasir-db
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_majujaya
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - si-kasir-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: si-kasir-phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db
    networks:
      - si-kasir-network

volumes:
  db_data:

networks:
  si-kasir-network:
    driver: bridge
